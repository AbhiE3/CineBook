<div class="mx-auto mt-8 max-w-md">
  <div class="card p-8">
    <div class="mb-6 text-center">
      <span class="mx-auto mb-3 grid h-12 w-12 place-items-center rounded-xl bg-tomato-500 text-white">
        <app-icon name="film" class="h-6 w-6" />
      </span>
      <h1 class="text-2xl font-extrabold">Create your account</h1>
      <p class="mt-1 text-sm text-gray-500">Join CineBook in seconds</p>
    </div>

    <!-- Role toggle -->
    <div class="mb-6 grid grid-cols-2 gap-1 rounded-lg border border-ink-600 bg-ink-900 p-1">
      <button
        type="button"
        class="rounded-md py-2 text-sm font-semibold transition-colors"
        [class]="mode() === 'user' ? 'bg-tomato-500 text-white' : 'text-gray-500 hover:text-gray-800'"
        (click)="mode.set('user')"
      >
        Moviegoer
      </button>
      <button
        type="button"
        class="rounded-md py-2 text-sm font-semibold transition-colors"
        [class]="mode() === 'admin' ? 'bg-tomato-500 text-white' : 'text-gray-500 hover:text-gray-800'"
        (click)="mode.set('admin')"
      >
        Theater Owner
      </button>
    </div>

    @if (error()) {
      <div class="mb-4 rounded-lg border border-tomato-600/40 bg-tomato-600/10 px-3 py-2 text-sm text-tomato-600">
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="mb-1.5 block text-sm font-medium text-gray-700">Username</label>
        <input class="input" name="username" [(ngModel)]="username" required autocomplete="username" />
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-gray-700">Password</label>
        <input
          class="input"
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          autocomplete="new-password"
        />
      </div>

      @if (mode() === 'admin') {
        <div>
          <label class="mb-1.5 block text-sm font-medium text-gray-700">Theater name</label>
          <input class="input" name="theaterName" [(ngModel)]="theaterName" required />
        </div>
        <div>
          <label class="mb-1.5 block text-sm font-medium text-gray-700">Theater location</label>
          <input class="input" name="theaterLocation" [(ngModel)]="theaterLocation" placeholder="e.g. Hyderabad" />
        </div>
      }

      <button type="submit" class="btn-primary w-full" [disabled]="loading()">
        @if (loading()) {
          <app-icon name="loader" class="h-4 w-4 animate-spin" /> Creating…
        } @else {
          Create account
        }
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500">
      Already have an account?
      <a routerLink="/login" class="font-semibold text-tomato-600 hover:underline">Sign in</a>
    </p>
  </div>
</div>
