<div class="mx-auto mt-8 max-w-md">
  <div class="card p-8">
    <div class="mb-6 text-center">
      <span class="mx-auto mb-3 grid h-12 w-12 place-items-center rounded-xl bg-tomato-500 text-white">
        <app-icon name="ticket" class="h-6 w-6" />
      </span>
      <h1 class="text-2xl font-extrabold">Welcome back</h1>
      <p class="mt-1 text-sm text-gray-500">Sign in to book your next show</p>
    </div>

    @if (error()) {
      <div class="mb-4 rounded-lg border border-tomato-600/40 bg-tomato-600/10 px-3 py-2 text-sm text-tomato-600">
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="mb-1.5 block text-sm font-medium text-gray-700">Username</label>
        <input class="input" name="username" [(ngModel)]="username" required autocomplete="username" />
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-gray-700">Password</label>
        <input
          class="input"
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          autocomplete="current-password"
        />
      </div>
      <button type="submit" class="btn-primary w-full" [disabled]="loading()">
        @if (loading()) {
          <app-icon name="loader" class="h-4 w-4 animate-spin" /> Signing in…
        } @else {
          Sign in
        }
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500">
      New here?
      <a routerLink="/register" class="font-semibold text-tomato-600 hover:underline">Create an account</a>
    </p>
  </div>
</div>
