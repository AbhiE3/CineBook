[build]
base = "frontend"
command = "npm install && npm run build"
publish = "dist/cinebook/browser"

# Proxy API requests to backend
[[redirects]]
  from = "/api/*"
  to = "https://cinebook2-ie7v.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback (Angular/React routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200